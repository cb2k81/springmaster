spring:
  application:
    name: springmaster

server:
  port: ${APP_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

springmaster:
  platform:
    version: 0.1.0-bootstrap
