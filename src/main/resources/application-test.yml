spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:springmaster-${random.uuid};MODE=MariaDB;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

logging:
  level:
    root: WARN
